<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Multi-Rabat ME PRO</title>
    <style>
        :root {
            --me-yellow: #ffe600;
            --me-dark: #1a1a1a;
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #d1d5db;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--me-dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 4px solid var(--me-yellow);
            margin-bottom: 30px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .product-table th {
            text-align: left;
            background: #f8fafc;
            padding: 12px;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }

        .product-row td {
            padding: 10px;
            border-bottom: 1px solid #edf2f7;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .exclude-col { text-align: center; width: 100px; }
        .exclude-col input { width: 20px; height: 20px; cursor: pointer; }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-add { background: #e2e8f0; color: #475569; }
        .btn-add:hover { background: #cbd5e1; }

        .btn-clear { background: #fee2e2; color: var(--danger); }
        .btn-clear:hover { background: #fecaca; }

        .btn-calc { 
            background: var(--me-yellow); 
            color: #000; 
            flex-grow: 1; 
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .btn-calc:hover { background: #e5cf00; transform: translateY(-1px); }

        .results { display: none; margin-top: 40px; animation: fadeIn 0.5s; }

        .summary-box {
            background: var(--me-dark);
            color: #fff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }

        .summary-price { font-size: 3rem; color: var(--me-yellow); font-weight: 800; }

        .grid-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
        }

        .order-card h3 { 
            margin-top: 0; 
            border-bottom: 2px solid var(--me-yellow); 
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .item-list { list-style: none; padding: 0; }
        .item-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .discount-badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Optymalizator Koszyka PRO</h1>
        <button class="btn-clear" onclick="clearData()">Wyczyść wszystko</button>
    </header>

    <table class="product-table">
        <thead>
            <tr>
                <th>Nazwa produktu</th>
                <th>Cena wyjściowa (zł)</th>
                <th>Cena po kodzie (zł)</th>
                <th class="exclude-col">Wyklucz z Multi</th>
                <th style="width: 50px;"></th>
            </tr>
        </thead>
        <tbody id="product-body">
            </tbody>
    </table>

    <div class="actions">
        <button class="btn-add" onclick="addProduct()">+ Dodaj produkt</button>
        <button class="btn-calc" onclick="runCalculation()">Oblicz najtańszą kombinację</button>
    </div>

    <div id="loader" class="loader">Analizowanie tysięcy kombinacji...</div>

    <div id="results" class="results">
        <div class="summary-box">
            <div>Najlepsza cena łączna za wszystkie zamówienia:</div>
            <div class="summary-price" id="total-price">0,00 zł</div>
            <div style="color: var(--success); font-weight: bold;" id="total-savings"></div>
        </div>
        <div class="grid-results" id="order-grid"></div>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('me_products')) || [
        { id: Date.now(), name: '', basePrice: '', codePrice: '', excluded: false }
    ];

    function save() {
        localStorage.setItem('me_products', JSON.stringify(products));
    }

    function render() {
        const body = document.getElementById('product-body');
        body.innerHTML = '';
        products.forEach(p => {
            const tr = document.createElement('tr');
            tr.className = 'product-row';
            tr.innerHTML = `
                <td><input type="text" placeholder="np. Lodówka" value="${p.name}" oninput="update(${p.id}, 'name', this.value)"></td>
                <td><input type="number" step="0.01" placeholder="0.00" value="${p.basePrice}" oninput="update(${p.id}, 'basePrice', this.value)"></td>
                <td><input type="number" step="0.01" placeholder="brak" value="${p.codePrice}" oninput="update(${p.id}, 'codePrice', this.value)"></td>
                <td class="exclude-col"><input type="checkbox" ${p.excluded ? 'checked' : ''} onchange="update(${p.id}, 'excluded', this.checked)"></td>
                <td><button style="color:var(--danger); background:none; font-size:1.2rem;" onclick="remove(${p.id})">🗑</button></td>
            `;
            body.appendChild(tr);
        });
    }

    function addProduct() {
        products.push({ id: Date.now(), name: '', basePrice: '', codePrice: '', excluded: false });
        render();
        save();
    }

    function remove(id) {
        products = products.filter(p => p.id !== id);
        render();
        save();
    }

    function update(id, field, value) {
        const p = products.find(p => p.id === id);
        if (p) p[field] = value;
        save();
    }

    function clearData() {
        if(confirm("Czy na pewno chcesz wyczyścić wszystkie dane?")) {
            products = [{ id: Date.now(), name: '', basePrice: '', codePrice: '', excluded: false }];
            render();
            save();
            document.getElementById('results').style.display = 'none';
        }
    }

    function format(val) {
        return (val / 100).toFixed(2).replace('.', ',') + ' zł';
    }

    function getBundleCost(items) {
        if (items.length === 0) return { total: 0, discount: 0 };
        if (items.length === 1) return { total: items[0].baseGrosze, discount: 0 };

        let sum = items.reduce((a, b) => a + b.baseGrosze, 0);
        let min = Math.min(...items.map(i => i.baseGrosze));
        let discount = 0;

        if (items.length === 2) discount = Math.round(min * 0.30);
        else if (items.length === 3) discount = Math.round(min * 0.55);
        else if (items.length === 4) discount = Math.round(min * 0.80);
        else if (items.length >= 5) discount = min - 100; // za 1 zł

        return { total: sum - discount, discount: discount };
    }

    function runCalculation() {
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        
        // Przygotowanie danych
        const validProducts = products.filter(p => p.basePrice > 0).map(p => ({
            name: p.name || "Produkt",
            baseGrosze: Math.round(parseFloat(p.basePrice) * 100),
            codeGrosze: p.codePrice ? Math.round(parseFloat(p.codePrice) * 100) : null,
            excluded: p.excluded
        }));

        if (validProducts.length === 0) return alert("Wpisz ceny produktów!");

        loader.style.display = 'block';
        results.style.display = 'none';

        // Timeout, żeby przeglądarka mogła wyświetlić loader przed ciężkimi obliczeniami
        setTimeout(() => {
            const best = solve(validProducts);
            display(best, validProducts);
            loader.style.display = 'none';
            results.style.display = 'block';
        }, 50);
    }

    function solve(items) {
        const n = items.length;
        let bestTotal = Infinity;
        let bestMap = null;

        // 5 stanów: 0-Luzem, 1-Koszyk1, 2-Koszyk2, 3-Koszyk3, 4-Koszyk4
        const states = 5;
        const totalCombos = Math.pow(states, n);

        for (let i = 0; i < totalCombos; i++) {
            let current = i;
            let currentTotal = 0;
            let groups = [[], [], [], [], []]; // 0: luzem, 1-4: koszyki
            let possible = true;

            for (let j = 0; j < n; j++) {
                let state = current % states;
                current = Math.floor(current / states);

                // Jeśli produkt jest wykluczony, a przypisujemy go do koszyka Multi (stany 1-4)
                if (items[j].excluded && state > 0) {
                    possible = false;
                    break;
                }
                groups[state].push(items[j]);
            }

            if (!possible) continue;

            // Liczenie kosztów
            // Grupa 0 (Luzem)
            groups[0].forEach(item => {
                currentTotal += (item.codeGrosze !== null && item.codeGrosze < item.baseGrosze) 
                                ? item.codeGrosze 
                                : item.baseGrosze;
            });

            // Grupy 1-4 (Multi)
            let res = [
                getBundleCost(groups[1]),
                getBundleCost(groups[2]),
                getBundleCost(groups[3]),
                getBundleCost(groups[4])
            ];

            res.forEach(r => currentTotal += r.total);

            if (currentTotal < bestTotal) {
                bestTotal = currentTotal;
                bestMap = { groups, res, bestTotal };
            }
        }
        return bestMap;
    }

    function display(best, allItems) {
        document.getElementById('total-price').innerText = format(best.bestTotal);
        
        let baseSum = allItems.reduce((a, b) => a + b.baseGrosze, 0);
        document.getElementById('total-savings').innerText = "Łączna oszczędność: " + format(baseSum - best.bestTotal);

        const grid = document.getElementById('order-grid');
        grid.innerHTML = '';

        // Renderowanie grup Multi
        for (let i = 1; i <= 4; i++) {
            if (best.groups[i].length > 0) {
                const card = document.createElement('div');
                card.className = 'order-card';
                let itemsHtml = best.groups[i].map(item => `
                    <li><span>${item.name}</span> <span>${format(item.baseGrosze)}</span></li>
                `).join('');
                
                card.innerHTML = `
                    <h3>Zamówienie Multi #${i} <span style="color:var(--success)">${format(best.res[i-1].total)}</span></h3>
                    <ul class="item-list">${itemsHtml}</ul>
                    <div style="text-align:right; margin-top:10px;">
                        <span class="discount-badge">Rabat Multi: -${format(best.res[i-1].discount)}</span>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        // Renderowanie grupy Luzem / Kody
        if (best.groups[0].length > 0) {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.style.borderColor = '#cbd5e1';
            let itemsHtml = best.groups[0].map(item => {
                let price = (item.codeGrosze !== null && item.codeGrosze < item.baseGrosze) ? item.codeGrosze : item.baseGrosze;
                let usedCode = item.codeGrosze !== null && item.codeGrosze < item.baseGrosze;
                return `<li>
                    <span>${item.name} ${usedCode ? '<span class="discount-badge" style="background:#e0f2fe; color:#0369a1">KOD</span>' : ''}</span> 
                    <span>${format(price)}</span>
                </li>`;
            }).join('');

            let groupSum = best.groups[0].reduce((sum, item) => {
                return sum + ((item.codeGrosze !== null && item.codeGrosze < item.baseGrosze) ? item.codeGrosze : item.baseGrosze);
            }, 0);

            card.innerHTML = `
                <h3 style="border-bottom-color:#94a3b8">Kody / Osobno <span>${format(groupSum)}</span></h3>
                <ul class="item-list">${itemsHtml}</ul>
            `;
            grid.appendChild(card);
        }
    }

    render();
</script>

</body>
</html>
