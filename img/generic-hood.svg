<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Chimney (Upper Part) -->
  <rect x="150" y="5" width="100" height="110" fill="url(#chimney-steel)" stroke="#4a5568" stroke-width="1"/>
  <!-- Canopy Hood (Lower part) -->
  <path d="M 50,150 L 120,115 L 280,115 L 350,150 Z" fill="url(#chimney-steel)" stroke="#4a5568" stroke-width="1"/>
  <!-- Glass Deflector Rim (Underneath, Modern slanted glass style) -->
  <rect x="30" y="150" width="340" height="35" rx="5" fill="#1a202c" stroke="#4a5568" stroke-width="2"/>
  <!-- Filters on underbelly -->
  <rect x="70" y="185" width="110" height="5" fill="#4a5568"/>
  <rect x="220" y="185" width="110" height="5" fill="#4a5568"/>
  <!-- LED Spotlights on underside -->
  <ellipse cx="60" cy="185" rx="10" ry="3" fill="#e2e8f0" stroke="#cbd5e0"/>
  <ellipse cx="340" cy="185" rx="10" ry="3" fill="#e2e8f0" stroke="#cbd5e0"/>
  <!-- Touch controls on center glass -->
  <rect x="160" y="158" width="80" height="18" rx="2" fill="#0d1117" stroke="#4a5568" stroke-width="1"/>
  <!-- Control Lights -->
  <circle cx="175" cy="167" r="3" fill="#00ff00"/>
  <circle cx="190" cy="167" r="3" fill="#718096"/>
  <circle cx="205" cy="167" r="3" fill="#718096"/>
  <circle cx="220" cy="167" r="3" fill="#718096"/>
  <circle cx="235" cy="167" r="3" fill="#ff0000"/>
  <defs>
    <linearGradient id="chimney-steel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="30%" stop-color="#718096"/>
      <stop offset="50%" stop-color="#cbd5e0"/>
      <stop offset="70%" stop-color="#718096"/>
      <stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>
  </defs>
</svg>
