<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Base Chassis -->
  <rect x="10" y="10" width="380" height="380" rx="10" fill="#111" stroke="#444" stroke-width="4"/>
  <!-- Control Panel Area -->
  <rect x="20" y="20" width="360" height="80" rx="5" fill="#1f1f1f"/>
  <!-- Left Knob -->
  <circle cx="60" cy="60" r="18" fill="#333" stroke="#888" stroke-width="2"/>
  <line x1="60" y1="42" x2="60" y2="60" stroke="#ffe600" stroke-width="3"/>
  <!-- Right Knob -->
  <circle cx="340" cy="60" r="18" fill="#333" stroke="#888" stroke-width="2"/>
  <line x1="340" y1="42" x2="340" y2="60" stroke="#ffe600" stroke-width="3"/>
  <!-- LED Display -->
  <rect x="140" y="38" width="120" height="44" rx="3" fill="#000" stroke="#333" stroke-width="2"/>
  <text x="200" y="68" fill="#ffcc00" font-family="Courier New, monospace" font-weight="bold" font-size="26" text-anchor="middle">12:30</text>
  <!-- Glass Door -->
  <rect x="25" y="115" width="350" height="240" rx="8" fill="#1c1d21" stroke="#2b2d31" stroke-width="6"/>
  <!-- Inside Glass Tint & Grill Grid -->
  <rect x="55" y="140" width="290" height="170" rx="5" fill="#0f0f12" stroke="#374151" stroke-width="3"/>
  <line x1="55" y1="180" x2="345" y2="180" stroke="#4b5563" stroke-width="2"/>
  <line x1="55" y1="225" x2="345" y2="225" stroke="#4b5563" stroke-width="2"/>
  <line x1="55" y1="270" x2="345" y2="270" stroke="#4b5563" stroke-width="2"/>
  <!-- Oven Handle -->
  <rect x="60" y="125" width="280" height="15" rx="3" fill="url(#metal-grad)" stroke="#333" stroke-width="1"/>
  <!-- Brand Logo -->
  <text x="200" y="375" fill="#555" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PREMIUM KITCHEN</text>
  <defs>
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#cccccc"/>
      <stop offset="70%" stop-color="#777777"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>
</svg>
