<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="100%" height="100%">
  <!-- Chassis Base -->
  <rect x="10" y="10" width="380" height="240" rx="8" fill="#111" stroke="#444" stroke-width="4"/>
  <!-- Glass Window -->
  <rect x="25" y="25" width="240" height="210" rx="5" fill="#1c1d21" stroke="#2d3748" stroke-width="4"/>
  <rect x="40" y="40" width="210" height="180" rx="3" fill="#0c0d10" stroke="#222" stroke-width="2"/>
  <!-- Turntable Plate Line -->
  <ellipse cx="145" cy="195" rx="70" ry="12" fill="none" stroke="#4a5568" stroke-width="2"/>
  <!-- Control Panel (Right Side) -->
  <rect x="280" y="25" width="95" height="210" rx="4" fill="#1d1e22"/>
  <!-- Display LED -->
  <rect x="290" y="35" width="75" height="35" rx="2" fill="#000"/>
  <text x="327" y="60" fill="#00e5ff" font-family="Courier New, monospace" font-size="20" font-weight="bold" text-anchor="middle">12:30</text>
  <!-- Buttons / Touch Interface -->
  <circle cx="305" cy="95" r="8" fill="#333" stroke="#555"/>
  <circle cx="327" cy="95" r="8" fill="#333" stroke="#555"/>
  <circle cx="349" cy="95" r="8" fill="#333" stroke="#555"/>
  <circle cx="305" cy="120" r="8" fill="#333" stroke="#555"/>
  <circle cx="327" cy="120" r="8" fill="#333" stroke="#555"/>
  <circle cx="349" cy="120" r="8" fill="#333" stroke="#555"/>
  <!-- Quick dial wheel -->
  <circle cx="327" cy="170" r="22" fill="#2d3748" stroke="#718096" stroke-width="2"/>
  <circle cx="327" cy="170" r="5" fill="#1a202c"/>
  <!-- Start/Stop buttons -->
  <rect x="290" y="205" width="32" height="20" rx="2" fill="#e53e3e"/>
  <rect x="333" y="205" width="32" height="20" rx="2" fill="#38a169"/>
</svg>
